ai_tools_used:
  - "Gemini"
  - "Claude"
  - "GitHub Copilot"

ai_usage_summary: |
  Used Gemini and Claude for code refactoring, pipeline debugging, and generating evaluation report structures. No candidate data was shared with external LLMs.

methodology_summary: |
  BM25 retrieval over career descriptions feeds a LightGBM LambdaMART Learning-to-Rank
  model trained on ~80 engineered features (career trajectory, product-vs-service ratio,
  domain-shipping evidence, JD skill/title overlap, behavioral availability). Honeypots
  (impossible-profile checks against real company founding years) are hard-dropped.
  Graded multiplicative penalties model the JD's explicit anti-signals: a domain-mismatch
  penalty down-weights computer-vision/speech/robotics-primary profiles with thin NLP/IR
  evidence, and a graded consulting penalty scales with product-vs-service career ratio.
  Reasoning is template-based and grounded only in verifiable profile fields (no LLM calls
  during ranking). Deterministic score+candidate_id tie-break yields the final Top-100.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
