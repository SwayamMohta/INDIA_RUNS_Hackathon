ai_usage_summary: |
  Used Gemini for code refactoring, pipeline debugging, and generating evaluation report structures. No candidate data was shared with external LLMs.

methodology_summary: |
  A machine learning pipeline utilizing a LightGBM LambdaMART Learning-to-Rank (LTR) model. Candidate profiles are first filtered through a honeypot suppression rule to eliminate trap profiles. Feature engineering constructs overlap/relevance signals (e.g. JD Jaccard overlap, title match score) combined with candidate attributes (e.g. notice period, responsiveness rate, certifications). Deterministic tie-breaking ensures unique candidate IDs in the final Top-100 list.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
